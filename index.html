<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheaton Family Practice Vacation Portal</title>

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <!-- Firebase init (with mock fallback) -->
    <script type="module">
        import { initDb } from "./js/firebase-init.js";
        window._dbReady = initDb().then(db => { window.db = db; return db; });
    </script>

    <!-- App styles -->
    <link rel="stylesheet" href="css/styles.css?v=6">
</head>
<body x-data="app()">

    <!-- Login View -->
    <div x-show="!authenticated" x-cloak>
        <div id="login-container">
            <h1>Wheaton Family Practice</h1>
            <h2>Vacation Portal</h2>

            <form @submit.prevent="login" class="login-form">
                <div class="form-group">
                    <label for="doctor-select">Physician</label>
                    <div class="select-with-prefix">
                        <span class="select-prefix">Dr.</span>
                        <select id="doctor-select" x-model="doctorName" required>
                            <option value="" disabled>Select your name</option>
                            <template x-for="doc in doctors" :key="doc.name">
                                <option :value="doc.name" x-text="doc.name"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password-input">Password</label>
                    <input
                        id="password-input"
                        type="password"
                        x-model="password"
                        placeholder="Enter practice password"
                        required
                    >
                </div>

                <div x-show="loginError" class="error-message" x-text="loginError" x-cloak></div>

                <button type="submit" class="btn btn-primary btn-full" :disabled="loginLoading">
                    <span x-show="!loginLoading">Sign In</span>
                    <span x-show="loginLoading" x-cloak>Signing in...</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main App View -->
    <div x-show="authenticated" x-cloak>
        <header>
            <div class="header-left"></div>
            <h1>Wheaton Family Practice Vacation Portal</h1>
            <div class="header-right">
                <span class="doctor-badge" x-text="'Dr. ' + doctorName"></span>
                <button class="btn btn-logout" @click="logout">Sign Out</button>
            </div>
        </header>

        <main>
            <div id="calendar-container">
                <div class="calendar-nav">
                    <button class="btn-nav" @click="calendarPrev()" title="Previous year">&#8249;</button>
                    <button class="btn-nav btn-nav-today" @click="calendarToday()" title="Go to today">Today</button>
                    <span class="calendar-nav-title" x-text="calendarTitle"></span>
                    <button class="btn-nav" @click="calendarNext()" title="Next year">&#8250;</button>
                </div>
                <div id="calendar-el"></div>
            </div>

            <aside id="date-sidebar">
                <h3>Selected Dates</h3>

                <!-- Pending dates -->
                <template x-if="pendingDates.length > 0">
                    <div class="date-section">
                        <h4 class="date-section-label pending-label">Pending</h4>
                        <ul class="date-list">
                            <template x-for="dateStr in pendingDates" :key="'p-' + dateStr">
                                <li class="date-item pending">
                                    <span x-text="formatDateShort(dateStr)"></span>
                                    <button class="btn btn-danger btn-icon" @click="removePendingDate(dateStr)" title="Remove">&times;</button>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>

                <!-- Submitted dates -->
                <template x-if="submittedDates.length > 0">
                    <div class="date-section">
                        <h4 class="date-section-label submitted-label">
                            Submitted
                            <span x-show="!isBeforeCutoff()" class="lock-badge" title="Editing locked after cutoff date">🔒</span>
                        </h4>
                        <ul class="date-list">
                            <template x-for="dateStr in submittedDates" :key="'s-' + dateStr">
                                <li class="date-item submitted">
                                    <span x-text="formatDateShort(dateStr)"></span>
                                    <button
                                        x-show="isBeforeCutoff()"
                                        class="btn btn-danger btn-icon"
                                        @click="deleteSubmittedDate(dateStr)"
                                        title="Remove"
                                    >&times;</button>
                                </li>
                            </template>
                        </ul>
                    </div>
                </template>

                <!-- Empty state -->
                <p x-show="pendingDates.length === 0 && submittedDates.length === 0"
                   class="empty-state">
                    Click or drag on the calendar to select vacation dates.
                </p>

                <!-- Actions -->
                <div class="sidebar-actions" x-show="pendingDates.length > 0">
                    <div class="pending-summary" x-text="pendingDates.length + ' day(s) selected'"></div>
                    <button class="btn btn-primary btn-full" @click="submitDates" :disabled="submitting">
                        <span x-show="!submitting">Submit Dates</span>
                        <span x-show="submitting" x-cloak>Submitting...</span>
                    </button>
                    <button class="btn btn-text btn-full" @click="clearPendingDates">Clear All</button>
                </div>

                <!-- Submit feedback -->
                <div x-show="submitMessage" x-cloak
                     :class="submitMessageType === 'success' ? 'submit-success' : 'submit-error'"
                     x-text="submitMessage">
                </div>
            </aside>
        </main>
    </div>

    <!-- App logic -->
    <script src="js/app.js?v=5"></script>
</body>
</html>
